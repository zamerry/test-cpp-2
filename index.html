<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: #eef3f9;
      padding: 25px 15px;
      color: #142b3f;
    }
    .test-container {
      max-width: 1400px;
      margin: 0 auto;
    }
    h1 {
      font-weight: 600;
      font-size: 2.3rem;
      background: linear-gradient(145deg, #184b70, #0b2d48);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
      margin-bottom: 10px;
    }
    .stats-bar {
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(4px);
      border-radius: 60px;
      padding: 18px 30px;
      margin: 10px 0 30px 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      border: 2px solid #c5d9ee;
      box-shadow: 0 8px 20px rgba(0,35,65,0.1);
    }
    .score {
      background: #134369;
      color: white;
      padding: 10px 28px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.5rem;
    }
    .progress {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .progress-item {
      background: white;
      border-radius: 40px;
      padding: 8px 22px;
      font-weight: 600;
      box-shadow: 0 3px 8px rgba(0,0,0,0.03);
      border: 1px solid #b9d3ef;
    }
    .reset-btn {
      background: white;
      border: 2px solid #134369;
      color: #134369;
      padding: 10px 32px;
      border-radius: 40px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.15s;
      font-size: 1rem;
    }
    .reset-btn:hover {
      background: #134369;
      color: white;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 22px;
    }
    .card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(2px);
      border-radius: 32px;
      padding: 20px 18px 18px 18px;
      box-shadow: 0 20px 30px -12px #193e5b;
      border: 1px solid #cfdef3;
      transition: 0.1s;
      display: flex;
      flex-direction: column;
    }
    .card:hover {
      background: #ffffff;
    }
    .q-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }
    .q-num {
      background: #1b4e78;
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.3rem;
      box-shadow: 0 8px 14px #07273e5e;
      flex-shrink: 0;
    }
    .q-text {
      font-weight: 600;
      font-size: 1.1rem;
      color: #0f334f;
      line-height: 1.4;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 8px;
    }
    .option {
      background: #f2f8ff;
      border: 2px solid #c2d6ec;
      border-radius: 50px;
      padding: 12px 18px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 0.95rem;
      color: #03283f;
      cursor: pointer;
      transition: 0.1s;
      line-height: 1.45;
      word-break: break-word;
      box-shadow: 0 2px 5px #0000000c;
    }
    .option:hover {
      background: #e2efff;
      border-color: #8eb6df;
    }
    /* стили для выбранных вариантов */
    .option.correct-pick {
      background: #c8f2d4 !important;
      border-color: #1d8f3c !important;
      color: #0b5622;
      font-weight: 550;
      box-shadow: 0 0 0 2px #b3e8c3 inset;
      position: relative;
    }
    .option.correct-pick::after {
      content: " ✓";
      font-weight: 800;
      color: #0f7a2b;
      float: right;
      font-size: 1.4rem;
    }
    .option.wrong-pick {
      background: #ffe7e3 !important;
      border-color: #c73e3e !important;
      color: #802626;
      text-decoration: line-through 1.8px #b32424;
      position: relative;
    }
    .option.wrong-pick::after {
      content: " ✗";
      font-weight: 800;
      color: #b43333;
      float: right;
      font-size: 1.4rem;
    }
    .option.disabled {
      pointer-events: none;
      opacity: 0.9;
    }
    .footer {
      margin-top: 45px;
      background: #d1e3f2;
      border-radius: 80px;
      padding: 18px 30px;
      text-align: center;
      color: #133e5c;
      border: 2px solid white;
      font-weight: 500;
    }
    .note {
      text-align: center;
      margin: 15px auto 0;
      background: #e7f0fa;
      padding: 8px 30px;
      border-radius: 60px;
      width: fit-content;
      border: 2px solid #b2cde8;
    }
  </style>
</head>

      { q: "Как настроить окно wxFrame на максимальное состояние при запуске?", opts: ["frame->SetFullScreen(true);", "frame->Maximize(true);", "frame->MaximizeWindow(true);", "frame->SetMaximizedState(true);", "frame->SetMaximized(true);"], correct: 1 },
      { q: "Как установить максимальный размер окна wxFrame?", opts: ["frame->SetMaxSize(wxSize(1024, 768));", "frame->SetSizeHints(wxSize(1024, 768));", "frame->SetMaxWidthHeight(wxSize(1024, 768));", "frame->SetMaxWindowSize(wxSize(1024, 768));", "frame->SetMaximumSize(wxSize(1024, 768));"], correct: 0 },
      { q: "Как изменить цвет фона для wxFrame?", opts: ["frame->SetBackgroundColor(wxColour(255, 255, 255));", "frame->SetColour(wxColour(255, 255, 255));", "frame->SetBackground(wxColour(255, 255, 255));", "frame->SetBgColour(wxColour(255, 255, 255));"], correct: 3 },
      { q: "Как обновить интерфейс в wxWidgets?", opts: ["panel->Update();", "panel->UpdateWindow();", "panel->Refresh();", "panel->RefreshWindow();", "panel->Redraw();"], correct: 2 },
      { q: "Как программно установить фокус на wxButton?", opts: ["button->SetFocus();", "button->Activate();", "button->GrabFocus();", "button->SetFocus(true);", "button->Focus();"], correct: 0 },
      { q: "Как в wxWidgets создать окно с несколькими панелями?", opts: ["wxPanel* panel1 = new wxPanel(parent, wxID_ANY); wxPanel* panel2 = new wxPanel(parent, wxID_ANY);", "new wxPanel(parent, wxID_ANY); panel1 = new wxPanel(parent, wxID_ANY); panel2 = Panel(parent, wxID_ANY);", "wxPanelBook* book = new wxPanelBook(this);", "panel1 = new wxPanel(parent, wxID_ANY); panel2 = wxPanel(parent, wxID_ANY);", "new wxPanel(parent, wxID_ANY); panel1->SetSize(wxSize(400, 400));"], correct: 0 },
      { q: "Как использовать wxFlexGridSizer для управления размерами компонентов?", opts: ["sizer->Add(textCtrl, 1, wxALIGN_LEFT, 5);", "sizer->AddWidget(textCtrl, 0, wxALL, 5);", "sizer->Add(textCtrl, 0, wxEXPAND | wxALL, 5);", "sizer->Add(textCtrl, 1, wxALL, 5);", "sizer->Add(textCtrl, 2, wxEXPAND, 10);"], correct: 2 },
      { q: "Как задать максимальную высоту для wxTextCtrl?", opts: ["textCtrl->SetMaxSize(wxSize(-1, 100));", "textCtrl->SetMinSize(wxSize(-1, 100));", "textCtrl->SetSizeHints(wxSize(-1, 100));", "textCtrl->SetMaxHeight(100);", "textCtrl->SetMaxDimensions(wxSize(-1, 100));"], correct: 0 },
      { q: "Как установить прозрачность для окна в wxWidgets?", opts: ["frame->SetOpacity(0.5);", "frame->SetTransparency(50);", "frame->SetTransparent(128);", "frame->SetTransparencyLevel(128);", "frame->SetAlpha(128);"], correct: 2 },
      { q: "Как создать таблицу в базе данных SQLite?", opts: ["sqlite3_execute(db, \"CREATE TABLE users(id INTEGER PRIMARY KEY, name TEXT);\");", "sqlite3_run(db, \"CREATE TABLE users(id INTEGER PRIMARY KEY, name TEXT);\");", "sqlite3_query(db, \"CREATE TABLE users(id INTEGER PRIMARY KEY, name TEXT);\");", "sqlite3_exec(db, \"CREATE TABLE users(id INTEGER PRIMARY KEY, name TEXT);\", nullptr, nullptr, nullptr);", "sqlite3_exec(db, \"CREATE TABLE IF NOT EXISTS users(id INTEGER PRIMARY KEY, name TEXT);\", nullptr, nullptr, nullptr);"], correct: 4 },
      { q: "Как сделать поле ввода wxTextCtrl многострочным?", opts: ["textCtrl->SetLines(true);", "textCtrl->SetTextStyle(0, wxTextCtrl::GetLength(), wxTE_MULTILINE);", "new wxTextCtrl(parent, wxID_ANY, \"\", wxDefaultPosition, wxDefaultSize, wxTE_MULTILINE);", "textCtrl->SetMultiline(true);", "textCtrl->SetMultipleLines(true);"], correct: 2 }
    ];

    // состояние ответов: null - не выбран, true - правильный, false - неправильный
    let questionState = Array(questions.length).fill(null);
    let selectedIdx = Array(questions.length).fill(null);

    const gridEl = document.getElementById('quizGrid');
    const scoreEl = document.getElementById('scoreDisplay');
    const correctSpan = document.getElementById('correctCount');
    const wrongSpan = document.getElementById('wrongCount');
    const remainingSpan = document.getElementById('remainingCount');
    const resetBtn = document.getElementById('resetBtn');

    function updateStats() {
      let correct = 0, wrong = 0;
      for (let i = 0; i < questionState.length; i++) {
        if (questionState[i] === true) correct++;
        else if (questionState[i] === false) wrong++;
      }
      const total = questions.length;
      scoreEl.innerText = `${correct}/${total}`;
      correctSpan.innerText = `✅ ${correct}`;
      wrongSpan.innerText = `❌ ${wrong}`;
      remainingSpan.innerText = `⏳ ${total - correct - wrong}`;
    }

    function handleOptionClick(e) {
      const opt = e.target.closest('.option');
      if (!opt) return;
      const qIdx = opt.dataset.qidx;
      const optIdx = opt.dataset.oidx;
      if (qIdx === undefined || optIdx === undefined) return;
      if (questionState[qIdx] !== null) return; // уже отвечено

      const correctIndex = questions[qIdx].correct;
      const isCorrect = (parseInt(optIdx) === correctIndex);
      questionState[qIdx] = isCorrect;
      selectedIdx[qIdx] = parseInt(optIdx);
      renderGrid();
    }

    function renderGrid() {
      let html = '';
      for (let i = 0; i < questions.length; i++) {
        const q = questions[i];
        const state = questionState[i];
        const selected = selectedIdx[i];
        const optsHtml = q.opts.map((opt, oIdx) => {
          let cls = 'option';
          if (state !== null) {
            if (oIdx === q.correct) cls += ' correct-pick';
            else if (oIdx === selected && oIdx !== q.correct) cls += ' wrong-pick';
            cls += ' disabled';
          }
          return `<div class="${cls}" data-qidx="${i}" data-oidx="${oIdx}" ${state !== null ? 'disabled' : ''}>${opt}</div>`;
        }).join('');
        html += `
                <div class="card">
                    <div class="q-header">
                        <span class="q-num">${i+1}</span>
                        <div class="q-text">${q.q}</div>
                    </div>
                    <div class="options">${optsHtml}</div>
                </div>
            `;
      }
      gridEl.innerHTML = html;
      updateStats();
    }

    function resetTest() {
      questionState = Array(questions.length).fill(null);
      selectedIdx = Array(questions.length).fill(null);
      renderGrid();
    }

    gridEl.addEventListener('click', handleOptionClick);
    resetBtn.addEventListener('click', resetTest);

    renderGrid();
  })();
</script>
</body>
</html>

      { q: "Как получить выделенный элемент wxListBox?", options: ["GetSelection()", "GetSelected()", "GetCurrentItem()", "GetSelectedItem()", "GetSelectionIndex()"], correct: 0 },
      { q: "Как добавить выпадающий список wxChoice?", options: ["new wxChoice(...); choice->Append(...)", "new wxChoice(...); choice->Add(...)", "new wxChoice(...); choice->Insert(...)", "new wxChoice(...); choice->AddItems(...)", "new wxChoice(...); choice->AppendItems(...)"], correct: 0 },
      { q: "Как задать шрифт для wxStaticText?", options: ["SetFont(...)", "SetLabelFont(...)", "ChangeFont(...)", "SetTextFont(...)", "SetFontStyle(...)"], correct: 0 },
      { q: "Как получить размер окна?", options: ["GetSize()", "GetDimensions()", "GetRect()", "GetWindowSize()", "GetClientSize()"], correct: 0 },
      { q: "Как создать wxSplitterWindow?", options: ["new wxSplitterWindow(...)", "wxSplitterWindow::Create(...)", "new wxSplitter(...)", "wxSplitterWindow *split = new wxSplitterWindow; split->Create(...)", "new wxSplitterWindow(parent, id, point, size, style)"], correct: 0 },
      { q: "Как добавить пункт в wxToolBar?", options: ["AddTool(...)", "InsertTool(...)", "AppendTool(...)", "AddItem(...)", "CreateTool(...)"], correct: 0 },
      { q: "Как задать строку подсказки?", options: ["SetToolTip(...)", "SetHint(...)", "SetHelpText(...)", "SetTooltipString(...)", "SetStatusTip(...)"], correct: 0 },
      { q: "Как обновить данные wxGrid?", options: ["Refresh()", "Update()", "Redraw()", "ForceRefresh()", "RefreshGrid()"], correct: 0 },
    ];

    // текущее состояние ответов (null - не выбран, true - выбран правильный, false - выбран неправильный)
    let questionState = Array(questionsData.length).fill(null);
    let selectedOptionIndex = Array(questionsData.length).fill(null); // какой индекс кликнули

    function renderTest() {
      const container = document.getElementById('testContainer');
      let html = '';
      for (let i = 0; i < questionsData.length; i++) {
        const q = questionsData[i];
        const state = questionState[i];
        const selectedIdx = selectedOptionIndex[i];
        const disabledClass = (state !== null) ? ' option-disabled' : ''; // но disabled через pointer-events
        const optionsHtml = q.options.map((opt, idx) => {
          let additionalClass = '';
          if (state !== null) {
            if (idx === q.correct) additionalClass = ' correct-selected';
            else if (idx === selectedIdx && idx !== q.correct) additionalClass = ' wrong-selected';
            // если правильный и выбрали неправильный — правильный всё равно подсветится зелёным?
            // добавим: если state не null и это правильный ответ (даже если выбрали другой), зелёным
            if (idx === q.correct) additionalClass = ' correct-selected';
            else if (idx === selectedIdx && idx !== q.correct) additionalClass = ' wrong-selected';
          }
          return `<div class="option${additionalClass}" data-qidx="${i}" data-oidx="${idx}" style="${state !== null ? 'pointer-events: none;' : ''}">${opt}</div>`;
        }).join('');
        html += `
                        <div class="question-card">
                            <div class="question-header">
                                <span class="question-num">${i+1}</span>
                                <div class="question-text">${q.q}</div>
                            </div>
                            <div class="options" data-qidx="${i}">
                                ${optionsHtml}
                            </div>
                        </div>
                    `;
      }
      container.innerHTML = html;
      updateStats();
    }

    function updateStats() {
      let correct = 0, wrong = 0;
      for (let i = 0; i < questionState.length; i++) {
        if (questionState[i] === true) correct++;
        else if (questionState[i] === false) wrong++;
      }
      const total = questionsData.length;
      document.getElementById('scoreDisplay').innerText = `${correct}/${total}`;
      document.getElementById('correctCountDisplay').innerHTML = `✅ ${correct}`;
      document.getElementById('wrongCountDisplay').innerHTML = `❌ ${wrong}`;
      document.getElementById('remainingDisplay').innerHTML = `⏳ ${total - correct - wrong}`;
    }

    function handleOptionClick(e) {
      const target = e.target.closest('.option');
      if (!target) return;
      const qidx = target.dataset.qidx;
      const oidx = target.dataset.oidx;
      if (qidx === undefined || oidx === undefined) return;
      if (questionState[qidx] !== null) return; // уже отвечен

      const correctIdx = questionsData[qidx].correct;
      const isCorrect = (parseInt(oidx) === correctIdx);
      questionState[qidx] = isCorrect; // true / false
      selectedOptionIndex[qidx] = parseInt(oidx);

      // перерисовать всё (или можно частично, но проще полный рендер)
      renderTest();
    }

    function resetTest() {
      questionState = Array(questionsData.length).fill(null);
      selectedOptionIndex = Array(questionsData.length).fill(null);
      renderTest();
    }

    document.addEventListener('DOMContentLoaded', () => {
      renderTest();
      document.getElementById('testContainer').addEventListener('click', handleOptionClick);
      document.getElementById('resetBtn').addEventListener('click', resetTest);
    });

  })();
</script>
</body>
</html>
